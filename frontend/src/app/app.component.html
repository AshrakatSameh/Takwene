<div class="min-h-screen">
  <!-- Sidebar (desktop) — only when logged in -->
  <aside
    *ngIf="isAuthenticated()"
    class="fixed left-0 top-0 h-full w-64 bg-white border-r border-gray-100 hidden lg:flex flex-col z-40"
  >
    <div class="p-6 border-b border-gray-100">
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 rounded-2xl bg-brand flex items-center justify-center shadow-lg shadow-brand/20"
        >
          <lucide-angular [img]="Music" class="w-5 h-5 text-white"></lucide-angular>
        </div>
        <div>
          <h1 class="font-bold text-brand text-lg tracking-wide">Takwene</h1>
          <p class="text-xs text-sage">Music Distribution</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-4 space-y-1">
      <a
        routerLink="/tracks"
        routerLinkActive="bg-brand/10 text-brand font-medium"
        class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-gray-600 hover:bg-gray-50 hover:text-gray-900"
      >
        <lucide-angular [img]="Disc3" class="w-5 h-5"></lucide-angular>
        <span>Tracks</span>
      </a>
      <a
        routerLink="/artists"
        routerLinkActive="bg-brand/10 text-brand font-medium"
        class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-gray-600 hover:bg-gray-50 hover:text-gray-900"
      >
        <lucide-angular [img]="Users" class="w-5 h-5"></lucide-angular>
        <span>Artists</span>
      </a>
    </nav>

    <div class="p-4 border-t border-gray-100">
      <button
        (click)="logout()"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-all"
      >
        <lucide-angular [img]="LogOut" class="w-5 h-5"></lucide-angular>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Mobile header — only when logged in -->
  <header
    *ngIf="isAuthenticated()"
    class="lg:hidden fixed top-0 left-0 right-0 h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 z-40"
  >
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-brand flex items-center justify-center">
        <lucide-angular [img]="Music" class="w-5 h-5 text-white"></lucide-angular>
      </div>
      <h1 class="font-bold text-brand text-lg">Takwene</h1>
    </div>
    <div class="flex items-center gap-3 text-sm">
      <a routerLink="/tracks" class="text-gray-600">Tracks</a>
      <a routerLink="/artists" class="text-gray-600">Artists</a>
      <button (click)="logout()" class="text-gray-600">Logout</button>
    </div>
  </header>

  <!-- Main content -->
  <main
    [class.lg:ml-64]="isAuthenticated()"
    [class.pt-16]="isAuthenticated()"
    [class.lg:pt-0]="isAuthenticated()"
    class="min-h-screen"
  >
    <router-outlet />
  </main>
</div>
