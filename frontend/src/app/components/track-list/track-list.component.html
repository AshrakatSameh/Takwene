<div class="max-w-5xl mx-auto p-6 lg:p-8">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-4">
      <div
        class="w-12 h-12 rounded-2xl bg-brand flex items-center justify-center shadow-lg shadow-brand/20"
      >
        <lucide-angular [img]="Disc3" class="w-6 h-6 text-white"></lucide-angular>
      </div>
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Tracks</h1>
        <p class="text-gray-500 text-sm">Browse all tracks, their artists, genres and current status</p>
      </div>
    </div>
    <a
      routerLink="/tracks/new"
      class="inline-flex items-center gap-2 bg-brand hover:bg-brand-dark text-white text-sm font-medium px-4 py-2.5 rounded-lg transition-colors"
    >
      <lucide-angular [img]="Plus" class="w-4 h-4"></lucide-angular>
      New Track
    </a>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
    <!-- Filter bar -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 px-5 py-4 border-b border-gray-100">
      <div class="inline-flex items-center gap-1 p-1 bg-gray-100 rounded-full">
        <button
          *ngFor="let f of filters"
          (click)="setFilter(f)"
          [class]="
            'px-4 py-1.5 rounded-full text-sm font-medium transition-all ' +
            (activeFilter === f
              ? 'bg-white text-gray-900 shadow-sm border border-gray-200'
              : 'text-gray-500 hover:text-gray-700')
          "
        >
          {{ f }}
        </button>
      </div>
      <span class="text-xs text-gray-400">{{ tracks.length }} track(s)</span>
    </div>

    <!-- Column header -->
    <div
      class="hidden md:grid grid-cols-12 gap-4 px-5 py-3 bg-gray-50/50 border-b border-gray-100"
    >
      <span class="col-span-5 text-xs font-semibold text-gray-500 uppercase tracking-wider">Title</span>
      <span class="col-span-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Artist</span>
      <span class="col-span-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Genre</span>
      <span class="col-span-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</span>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="px-5 py-12 text-center text-gray-400 text-sm">Loading tracks…</div>

    <!-- Error -->
    <div *ngIf="error && !loading" class="px-5 py-12 text-center text-red-600 text-sm">{{ error }}</div>

    <!-- Empty -->
    <div *ngIf="!loading && !error && tracks.length === 0" class="px-5 py-12 text-center text-gray-400 text-sm">
      No tracks found for this filter.
    </div>

    <!-- Rows -->
    <a
      *ngFor="let t of tracks"
      [routerLink]="['/tracks', t.id]"
      class="grid grid-cols-12 gap-4 px-5 py-4 items-center border-b border-gray-50 last:border-0 hover:bg-brand/[0.03] transition-colors group cursor-pointer"
    >
      <div class="col-span-12 md:col-span-5 flex items-center gap-3 min-w-0">
        <div class="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center shrink-0">
          <lucide-angular [img]="Music2" class="w-5 h-5 text-gray-500"></lucide-angular>
        </div>
        <p class="font-medium text-gray-900 text-sm truncate">{{ t.title }}</p>
      </div>
      <div class="col-span-6 md:col-span-3 text-sm text-gray-600 truncate">{{ t.artistName }}</div>
      <div class="col-span-3 md:col-span-2 text-sm text-gray-500 truncate">{{ t.genre }}</div>
      <div class="col-span-3 md:col-span-2 flex items-center justify-between">
        <span
          [class]="'inline-block text-xs px-2.5 py-1 rounded-full border font-medium ' + statusClass(t.status)"
        >
          {{ t.status }}
        </span>
        <lucide-angular
          [img]="ChevronRight"
          class="w-4 h-4 text-gray-300 group-hover:text-brand transition-colors hidden md:block"
        ></lucide-angular>
      </div>
    </a>
  </div>
</div>
