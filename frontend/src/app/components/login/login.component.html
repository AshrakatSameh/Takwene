<div class="max-w-md mx-auto p-6 lg:p-8 mt-10">
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
    <div class="flex flex-col items-center mb-6">
      <div class="w-12 h-12 rounded-2xl bg-brand flex items-center justify-center shadow-lg shadow-brand/20 mb-3">
        <lucide-angular [img]="LogIn" class="w-6 h-6 text-white"></lucide-angular>
      </div>
      <h1 class="text-xl font-bold text-gray-900">Sign in</h1>
      <p class="text-sm text-gray-500 mt-1">Use the demo admin to manage tracks</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input
          type="text"
          formControlName="username"
          class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 outline-none focus:border-brand/40 focus:ring-2 focus:ring-brand/10 transition-all"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          type="password"
          formControlName="password"
          class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 outline-none focus:border-brand/40 focus:ring-2 focus:ring-brand/10 transition-all"
        />
      </div>

      <p *ngIf="error" class="text-sm text-red-600">{{ error }}</p>

      <button
        type="submit"
        [disabled]="form.invalid || submitting"
        class="w-full bg-brand hover:bg-brand-dark text-white font-medium py-2.5 rounded-lg transition-colors disabled:opacity-50"
      >
        {{ submitting ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <p class="text-xs text-gray-400 text-center mt-4">Demo: admin / Admin123!</p>
  </div>
</div>
