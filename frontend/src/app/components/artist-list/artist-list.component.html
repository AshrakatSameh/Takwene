<div class="max-w-5xl mx-auto p-6 lg:p-8">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 rounded-2xl bg-brand flex items-center justify-center shadow-lg shadow-brand/20">
        <lucide-angular [img]="Users" class="w-6 h-6 text-white"></lucide-angular>
      </div>
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Artists</h1>
        <p class="text-gray-500 text-sm">All artists in the catalogue</p>
      </div>
    </div>
    <a
      routerLink="/artists/new"
      class="inline-flex items-center gap-2 bg-brand hover:bg-brand-dark text-white text-sm font-medium px-4 py-2.5 rounded-lg transition-colors"
    >
      <lucide-angular [img]="Plus" class="w-4 h-4"></lucide-angular>
      New Artist
    </a>
  </div>

  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
    <div class="hidden md:grid grid-cols-12 gap-4 px-5 py-3 bg-gray-50/50 border-b border-gray-100">
      <span class="col-span-5 text-xs font-semibold text-gray-500 uppercase tracking-wider">Name</span>
      <span class="col-span-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</span>
      <span class="col-span-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Country</span>
    </div>

    <div *ngIf="loading" class="px-5 py-12 text-center text-gray-400 text-sm">Loading artists…</div>
    <div *ngIf="error && !loading" class="px-5 py-12 text-center text-red-600 text-sm">{{ error }}</div>
    <div *ngIf="!loading && !error && artists.length === 0" class="px-5 py-12 text-center text-gray-400 text-sm">
      No artists yet.
    </div>

    <div
      *ngFor="let a of artists"
      class="grid grid-cols-12 gap-4 px-5 py-4 items-center border-b border-gray-50 last:border-0"
    >
      <div class="col-span-12 md:col-span-5 flex items-center gap-3 min-w-0">
        <div class="w-10 h-10 rounded-full bg-brand/10 flex items-center justify-center shrink-0 text-brand font-semibold text-sm">
          {{ a.name.charAt(0) }}
        </div>
        <p class="font-medium text-gray-900 text-sm truncate">{{ a.name }}</p>
      </div>
      <div class="col-span-6 md:col-span-4 text-sm text-gray-600 truncate flex items-center gap-1.5">
        <lucide-angular [img]="Mail" class="w-3.5 h-3.5 text-gray-400"></lucide-angular>
        {{ a.email }}
      </div>
      <div class="col-span-6 md:col-span-3 text-sm text-gray-500 truncate flex items-center gap-1.5">
        <lucide-angular [img]="MapPin" class="w-3.5 h-3.5 text-gray-400"></lucide-angular>
        {{ a.country }}
      </div>
    </div>
  </div>
</div>
